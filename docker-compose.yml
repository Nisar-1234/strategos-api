version: "3.9"

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: strategos-db
    environment:
      POSTGRES_USER: strategos
      POSTGRES_PASSWORD: strategos
      POSTGRES_DB: strategos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strategos"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: strategos-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
