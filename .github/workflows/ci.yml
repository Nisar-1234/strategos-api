name: API CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: strategos
          POSTGRES_PASSWORD: strategos
          POSTGRES_DB: strategos_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U strategos"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://strategos:strategos@localhost:5432/strategos_test
      DATABASE_URL_SYNC: postgresql://strategos:strategos@localhost:5432/strategos_test
      REDIS_URL: redis://localhost:6379/0
      # Dummy values so config loads without secrets
      ANTHROPIC_API_KEY: ""
      OPENAI_API_KEY: ""
      NEWSAPI_KEY: ""
      ALPHA_VANTAGE_KEY: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: python -m alembic upgrade head

      - name: Run tests
        run: pytest -x -q --tb=short
